    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    /* ============================================
       SERVER API HELPERS (REPLACES LOCALSTORAGE)
    ============================================ */
    async function apiGetProducts() {
      try {
        const response = await fetch('/api/products', { cache: 'no-store' });
        if (!response.ok) throw new Error('Failed to fetch products');
        return await response.json();
      } catch (err) {
        console.error('[API ERROR]:', err);
        return [];
      }
    }

    async function apiSaveProduct(product) {
      try {
        const method = product.id ? 'PUT' : 'POST';
        const url = product.id ? `/api/products/${product.id}` : '/api/products';
        
        const response = await fetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(product)
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.message || 'Failed to save product');
        }

        return await response.json();
      } catch (err) {
        console.error('[API ERROR]:', err);
        throw err;
      }
    }

    async function apiDeleteProduct(id) {
      try {
        const response = await fetch(`/api/products/${id}`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' }
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.message || 'Failed to delete product');
        }

        return await response.json();
      } catch (err) {
        console.error('[API ERROR]:', err);
        throw err;
      }
    }

    function hexToRgb(hex) {
      if (!hex) return null;
      const shorthandRegex = /^#?([a-f\d])([a-f\d])([a-f\d])$/i;
      const fullHex = hex.replace(shorthandRegex, (m, r, g, b) => r + r + g + g + b + b);
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(fullHex);
      return result ? {
        r: parseInt(result[1], 16),
        g: parseInt(result[2], 16),
        b: parseInt(result[3], 16)
      } : null;
    }

    function getNearestColorName(hex) {
      const rgb = hexToRgb(hex);
      if (!rgb) return 'New Color';
      let minDistance = Infinity;
      let closestName = 'New Color';
      for (const c of COLOR_NAMES_LIST) {
        const cRgb = hexToRgb(c.hex);
        if (!cRgb) continue;
        const dist = Math.sqrt(
          Math.pow(rgb.r - cRgb.r, 2) +
          Math.pow(rgb.g - cRgb.g, 2) +
          Math.pow(rgb.b - cRgb.b, 2)
        );
        if (dist < minDistance) {
          minDistance = dist;
          closestName = c.name;
        }
      }
      return closestName;
    }

    function resolveHexFromName(name) {
      if (!name) return '#808080';
      const cleanName = name.trim().toLowerCase();
      const found = COLOR_NAMES_LIST.find(c => c.name.toLowerCase() === cleanName);
      if (found) return found.hex;

      const partial = COLOR_NAMES_LIST.find(c => cleanName.includes(c.name.toLowerCase()) || c.name.toLowerCase().includes(cleanName));
      if (partial) return partial.hex;

      const cssColors = {
        black: '#000000', white: '#ffffff', red: '#dc2626', green: '#16a34a', blue: '#2563eb', yellow: '#ca8a04',
        orange: '#ea580c', purple: '#9333ea', pink: '#db2777', gray: '#4b5563', grey: '#4b5563', brown: '#78350f',
        beige: '#f5f5dc', cream: '#fdf6e2', gold: '#eab308', silver: '#cbd5e1', bronze: '#cd7f32', navy: '#1e3a8a',
        teal: '#0d9488', olive: '#808000', lime: '#84cc16', lavender: '#e9d5ff', peach: '#ffdab9', coral: '#f87171',
        tan: '#d2b48c', indigo: '#4f46e5', violet: '#7c3aed', magenta: '#d946ef', cyan: '#06b6d4', amber: '#f59e0b',
        emerald: '#10b981', rose: '#f43f5e', plum: '#4c1d95', rust: '#b45309', silt: '#4a4540', sage: '#8fa89b',
        obsidian: '#2d2a26', alabaster: '#fcfbfa', desert: '#cda885', sand: '#f5f5dc'
      };

      for (const [key, hex] of Object.entries(cssColors)) {
        if (cleanName.includes(key)) return hex;
      }

      let hash = 0;
      for (let i = 0; i < cleanName.length; i++) {
        hash = cleanName.charCodeAt(i) + ((hash << 5) - hash);
      }
      let color = '#';
      for (let i = 0; i < 3; i++) {
        const value = (hash >> (i * 8)) & 0xFF;
        const balanced = Math.floor(40 + (value % 160));
        color += ('00' + balanced.toString(16)).slice(-2);
      }
      return color;
    }

    /* ============================================
       TOAST COMPONENT
    ============================================ */
    function Toast({ toasts, remove }) {
      return (
        <div className="fixed bottom-6 right-6 z-[9999] flex flex-col gap-2 pointer-events-none">
          {toasts.map(t => (
            <div key={t.id} className={`slide-in flex items-center gap-3 px-5 py-3 rounded-xl shadow-2xl text-white text-sm font-semibold min-w-[260px] pointer-events-auto
              ${t.type==='success'?'bg-emerald-600':t.type==='error'?'bg-red-600':'bg-gray-800'}`}>
              <i className={`fas ${t.type==='success'?'fa-check-circle':t.type==='error'?'fa-times-circle':'fa-info-circle'}`}></i>
              <span className="flex-1">{t.message}</span>
              <button className="opacity-60 hover:opacity-100" onClick={()=>remove(t.id)}><i className="fas fa-times text-xs"></i></button>
            </div>
          ))}
        </div>
      );
    }

    function useToast() {
      const [toasts, setToasts] = useState([]);
      const add = useCallback((message, type='success') => {
        const id = genId();
        setToasts(p => [...p, { id, message, type }]);
        setTimeout(() => setToasts(p => p.filter(t=>t.id!==id)), 4000);
      }, []);
      const remove = useCallback(id => setToasts(p=>p.filter(t=>t.id!==id)), []);
      return { toasts, add, remove };
    }

    /* ============================================
       LOGIN PAGE
    ============================================ */
    function LoginPage({ onLogin }) {
      const [user,     setUser]     = useState('');
      const [pass,     setPass]     = useState('');
      const [showPass, setShowPass] = useState(false);
      const [error,    setError]    = useState('');
      const [loading,  setLoading]  = useState(false);

      const submit = e => {
        e.preventDefault();
        setError(''); setLoading(true);
        fetch('api/admin.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user, password: pass })
        })
        .then(async res => {
          const data = await res.json();
          setLoading(false);
          if (res.ok && data.success) {
            sessionStorage.setItem('aura_admin_auth', '1');
            onLogin();
          } else {
            setError(data.error || 'Invalid username or password.');
          }
        })
        .catch(err => {
          console.error(err);
          const currentPass = localStorage.getItem('aura_admin_password') || 'admin123';
          if (user === ADMIN_USER && pass === currentPass) {
            sessionStorage.setItem('aura_admin_auth', '1');
            onLogin();
          } else {
            setError('Invalid username or password.');
          }
          setLoading(false);
        });
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-gray-950 via-gray-900 to-gray-800 flex items-center justify-center p-4 relative overflow-hidden">

            </div>

            <div className="bg-white rounded-3xl p-8 shadow-2xl">
              <h2 className="font-heading text-2xl font-bold text-gray-900 mb-1">Sign In</h2>
              <p className="text-gray-400 text-sm mb-7">Enter your admin credentials to continue</p>

              <form onSubmit={submit} className="space-y-4">
                <div>
                  <label className="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Username</label>
                  <div className="relative">
                    <i className="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 text-sm"></i>
                    <input type="text" value={user} onChange={e=>setUser(e.target.value)} placeholder="admin" required
                      className="w-full pl-10 pr-4 py-3 border-2 border-gray-100 bg-gray-50 rounded-xl text-sm focus:outline-none focus:border-accent focus:bg-white transition-all" />
                  </div>
                </div>

                <div>
                  <label className="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Password</label>
                  <div className="relative">
                    <i className="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 text-sm"></i>
                    <input type={showPass?'text':'password'} value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" required
                      className="w-full pl-10 pr-11 py-3 border-2 border-gray-100 bg-gray-50 rounded-xl text-sm focus:outline-none focus:border-accent focus:bg-white transition-all" />
                    <button type="button" onClick={()=>setShowPass(p=>!p)} className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">

                {error && (

    /* ============================================
       MAIN APP
    ============================================ */
    function App() {
      const [isLoggedInState, setIsLoggedIn] = useState(isLoggedIn());
      const [page, setPage] = useState('dashboard');
      const [products, setProducts] = useState([]);
      const [categories, setCategories] = useState(['Traditional', 'Modern Cut', 'Minimalist', 'Lounge Wear']);
      const [loading, setLoading] = useState(true);
      const [collapsed, setCollapsed] = useState(false);
      const [editProduct, setEditProduct] = useState(null);
      const [deleteConfirm, setDeleteConfirm] = useState(null);
      const { toasts, add: addToast, remove: removeToast } = useToast();

      // Load products from server on mount
      useEffect(() => {
        const loadProducts = async () => {
          setLoading(true);
          try {
            const prods = await apiGetProducts();
            setProducts(prods);
          } catch (err) {
            addToast('Failed to load products', 'error');
          }
          setLoading(false);
        };

        if (isLoggedInState) {
          loadProducts();
        }
      }, [isLoggedInState]);

      const handleSaveProduct = async (product) => {
        try {
          const result = await apiSaveProduct(product);
          
          if (product.id) {
            setProducts(p => p.map(prod => prod.id === product.id ? result.product : prod));
            addToast('Product updated successfully!', 'success');
          } else {
            setProducts(p => [...p, result.product]);
            addToast('Product created successfully!', 'success');
          }

          setEditProduct(null);
          setPage('products');
        } catch (err) {
          addToast(err.message || 'Failed to save product', 'error');
        }
      };

      const handleDeleteProduct = async (id) => {
        try {
          await apiDeleteProduct(id);
          setProducts(p => p.filter(prod => prod.id !== id));
          addToast('Product deleted successfully!', 'success');
          setDeleteConfirm(null);
        } catch (err) {
          addToast(err.message || 'Failed to delete product', 'error');
        }
      };

      if (!isLoggedInState) {
        return <LoginPage onLogin={() => setIsLoggedIn(true)} />;
      }

      return (
        <div className="flex h-screen bg-gray-50">
          <Sidebar page={page} setPage={setPage} onLogout={() => { sessionStorage.removeItem('aura_admin_auth'); setIsLoggedIn(false); }} collapsed={collapsed} setCollapsed={setCollapsed} />
          
          <main className={`flex-1 overflow-auto transition-all duration-300 ${collapsed?'ml-[72px]':'ml-[280px] md:ml-[280px]'}`}>
            <div className="p-6 md:p-8 max-w-7xl mx-auto">
              {loading && page !== 'add' && page !== 'edit' ? (
                <div className="flex items-center justify-center h-96">
                  <div className="text-center">
                    <i className="fas fa-spinner fa-spin text-4xl text-accent mb-4"></i>
                    <p className="text-gray-500">Loading...</p>
                  </div>
                </div>
              ) : page === 'dashboard' ? (
                <DashboardPage products={products} setPage={setPage} categories={categories} />
              ) : page === 'products' ? (
                <ProductsPage products={products} setPage={setPage} setEditProduct={setEditProduct} setDeleteConfirm={setDeleteConfirm} toast={addToast} />
              ) : page === 'add' || page === 'edit' ? (
                <ProductFormPage editProduct={editProduct} onSave={handleSaveProduct} onCancel={() => { setEditProduct(null); setPage('products'); }} toast={addToast} categories={categories} onAddCategory={(name) => { if (!categories.includes(name)) { setCategories(c => [...c, name]); return true; } return false; }} />
              ) : page === 'analytics' ? (
                <AnalyticsPage products={products} />
              ) : page === 'settings' ? (
                <SettingsPage toast={addToast} />
              ) : null}
            </div>
          </main>

          <Toast toasts={toasts} remove={removeToast} />
          <ConfirmModal open={!!deleteConfirm} title="Delete Product" message="Are you sure you want to delete this product? This action cannot be undone." onConfirm={() => handleDeleteProduct(deleteConfirm.id)} onCancel={() => setDeleteConfirm(null)} />
        </div>
      );
    }

    // Sidebar, DashboardPage, ProductsPage, ProductFormPage, AnalyticsPage, SettingsPage components
    // (These are large - importing from original structure)
    
    function Sidebar({ page, setPage, onLogout, collapsed, setCollapsed }) {
      const nav = [
        { id:'dashboard', icon:'fas fa-chart-pie',    label:'Dashboard' },
        { id:'products',  icon:'fas fa-box-open',     label:'Products'  },
        { id:'add',       icon:'fas fa-plus-circle',  label:'Add Product'},
        { id:'analytics', icon:'fas fa-chart-line',   label:'Analytics' },
        { id:'settings',  icon:'fas fa-cog',          label:'Settings'  },
      ];
      return (
        <aside className={`fixed inset-y-0 left-0 flex flex-col bg-gray-950/75 backdrop-blur-lg border-r border-white/10 text-white z-40 transition-all duration-300 ${collapsed?'w-[72px]':'w-[280px]'}`}>
          <div className={`flex items-center border-b border-white/10 h-16 px-4 ${collapsed?'justify-center':'justify-between'}`}>
            {!collapsed && <span className="font-heading font-extrabold text-xl tracking-[0.1em]">ELAWI</span>}
            <button onClick={()=>setCollapsed(c=>!c)} className="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-white/10 transition-colors text-gray-400 hover:text-white">
              <i className={`fas ${collapsed?'fa-bars':'fa-chevron-left'} text-sm`}></i>
            </button>
          </div>

          {!collapsed && (
            <div className="px-4 py-4 border-b border-white/10">
              <div className="flex items-center gap-3">
                <div className="w-8 h-8 rounded-full bg-accent flex items-center justify-center font-heading font-bold text-xs flex-shrink-0 text-white">AD</div>
                <div className="min-w-0">
                  <p className="text-sm font-semibold leading-tight truncate text-white">Administrator</p>
                  <p className="text-xs text-gray-500">Super Admin</p>
                </div>
              </div>
            </div>
          )}

          <nav className="flex-1 p-2 overflow-y-auto space-y-0.5 mt-2">
            {nav.map(item => (
              <button key={item.id} onClick={()=>setPage(item.id)} title={collapsed?item.label:''}
                className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all
                  ${page===item.id?'bg-accent text-white shadow-lg shadow-accent/30':'text-gray-400 hover:text-white hover:bg-white/10'}
                  ${collapsed?'justify-center':''}`}>
                <i className={`${item.icon} w-4 text-center flex-shrink-0`}></i>
                {!collapsed && <span>{item.label}</span>}
              </button>
            ))}
          </nav>

          <div className="p-2 border-t border-white/10 space-y-0.5">
            <a href="shop.html" title={collapsed?'View Store':''} className={`flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-400 hover:text-white hover:bg-white/10 transition-all text-sm ${collapsed?'justify-center':''}`}>
              <i className="fas fa-store w-4 text-center flex-shrink-0"></i>
              {!collapsed && <span>View Store</span>}
            </a>
            <button onClick={onLogout} title={collapsed?'Logout':''} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-400 hover:text-red-400 hover:bg-red-900/20 transition-all text-sm ${collapsed?'justify-center':''}`}>
              <i className="fas fa-sign-out-alt w-4 text-center flex-shrink-0"></i>
              {!collapsed && <span>Logout</span>}
            </button>
          </div>
        </aside>
      );
    }

    function DashboardPage({ products, setPage, categories }) {
      const totalVal  = products.reduce((s,p) => s + p.price, 0);
      const cats      = [...new Set(products.map(p=>p.category))];
      const avgRating = (products.reduce((s,p)=>s+(p.rating||4.8),0)/(products.length||1)).toFixed(1);
      const saleCount = products.filter(p=>p.salePrice).length;
      const catDist = categories.map(cat => ({
        cat, count: products.filter(p=>p.category===cat).length
      })).filter(c=>c.count>0);
      const maxCount = Math.max(...catDist.map(c=>c.count), 1);

      return (
        <div className="space-y-7 fade-in">
          <div className="flex items-center justify-between">
            <div>
              <h1 className="font-heading text-2xl font-extrabold text-gray-900">Dashboard</h1>
              <p className="text-gray-400 text-xs mt-0.5">Welcome back — here's your store overview.</p>
            </div>
            <button onClick={()=>setPage('add')} className="flex items-center gap-2 px-4 py-2 bg-accent text-white text-sm font-semibold rounded-xl hover:bg-accent-dark transition-colors">
              <i className="fas fa-plus"></i> Add Product
            </button>
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <StatsCard icon="fas fa-box-open"  label="Total Products"  value={products.length} sub="Active catalog"          bg="bg-accent"      trend={12} />
            <StatsCard icon="fas fa-dollar-sign" label="Total Value"     value={`Br ${totalVal.toFixed(2)}`} sub="Current retail price"   bg="bg-green-500"  trend={8}  />
            <StatsCard icon="fas fa-tags"        label="Categories"    value={cats.length}       sub={`of ${categories.length}`} bg="bg-blue-500"  />
            <StatsCard icon="fas fa-star"        label="Avg Rating"    value={avgRating}          sub={`${saleCount} on sale`}    bg="bg-amber-500" trend={2}  />
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-5 gap-5">
            <div className="lg:col-span-3 bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
              <div className="flex items-center justify-between mb-4">
                <h2 className="font-heading font-bold text-gray-900">Recent Products</h2>
                <button onClick={()=>setPage('products')} className="text-accent text-xs font-semibold hover:underline">View All →</button>
              </div>
              <div className="space-y-2">
                {[...products].reverse().slice(0,5).map(p => (
                  <div key={p.id} className="flex items-center gap-3 p-2.5 rounded-xl hover:bg-gray-50 transition-colors">
                    <div className="w-10 h-10 rounded-xl flex items-center justify-center text-xl flex-shrink-0" style={{background:p.color||'#f5f2eb'}}>{p.emoji||p.icon||'✨'}</div>
                    <div className="flex-1 min-w-0">
                      <p className="text-sm font-semibold text-gray-900 truncate">{p.title||p.name}</p>
                      <p className="text-xs text-gray-400">{p.category}</p>
                    </div>
                    <div className="text-right flex-shrink-0">
                      <p className="text-sm font-bold text-gray-900">Br {p.price.toFixed(2)}</p>
                      <p className="text-xs text-amber-500">★ {p.rating||4.8}</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div className="lg:col-span-2 bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
              <h2 className="font-heading font-bold text-gray-900 mb-4">By Category</h2>
              <div className="space-y-3">
                {catDist.map(c => (
                  <div key={c.cat}>
                    <div className="flex justify-between text-xs mb-1">
                      <span className="font-medium text-gray-700">{c.cat}</span>
                      <span className="text-gray-400">{c.count}</span>
                    </div>
                    <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                      <div className="h-full bg-accent rounded-full transition-all duration-700" style={{width:`${(c.count/maxCount)*100}%`}}></div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function ProductsPage({ products, setPage, setEditProduct, setDeleteConfirm, toast }) {
      return (
        <div className="space-y-6 fade-in">
          <div className="flex items-center justify-between">
            <div>
              <h1 className="font-heading text-2xl font-extrabold text-gray-900">Products</h1>
              <p className="text-gray-400 text-xs mt-0.5">Manage your product catalog</p>
            </div>
            <button onClick={()=>setPage('add')} className="flex items-center gap-2 px-4 py-2 bg-accent text-white text-sm font-semibold rounded-xl hover:bg-accent-dark transition-colors">
              <i className="fas fa-plus"></i> Add New
            </button>
          </div>

          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full">
                <thead className="bg-gray-50 border-b border-gray-100">
                  <tr>
                    <th className="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Product</th>
                    <th className="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Category</th>
                    <th className="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Price</th>
                    <th className="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Rating</th>
                    <th className="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Actions</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-100">
                  {products.map(p => (
                    <tr key={p.id} className="hover:bg-gray-50 transition-colors">
                      <td className="px-6 py-4">
                        <div className="flex items-center gap-3">
                          <div className="w-10 h-10 rounded-lg flex items-center justify-center text-lg flex-shrink-0" style={{background:p.color||'#f5f2eb'}}>{p.emoji||p.icon||'✨'}</div>
                          <div className="min-w-0">
                            <p className="text-sm font-semibold text-gray-900 truncate">{p.title||p.name}</p>
                          </div>
                        </div>
                      </td>
                      <td className="px-6 py-4 text-sm text-gray-600">{p.category}</td>
                      <td className="px-6 py-4 text-sm font-semibold text-gray-900">Br {p.price}</td>
                      <td className="px-6 py-4 text-sm text-amber-600">★ {p.rating||4.8}</td>
                      <td className="px-6 py-4 text-sm space-x-2">
                        <button onClick={()=>{setEditProduct(p); setPage('edit');}} className="px-3 py-1 bg-blue-100 text-blue-600 rounded-lg hover:bg-blue-200 transition-colors">
                          <i className="fas fa-edit"></i> Edit
                        </button>
                        <button onClick={()=>setDeleteConfirm(p)} className="px-3 py-1 bg-red-100 text-red-600 rounded-lg hover:bg-red-200 transition-colors">
                          <i className="fas fa-trash"></i> Delete
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    function ProductFormPage({ editProduct, onSave, onCancel, toast, categories, onAddCategory }) {
      const [form, setForm] = useState({
        title: editProduct?.title||editProduct?.name||'', 
        category: editProduct?.category||categories[0]||'Traditional',
        price: String(editProduct?.price||''),
        salePrice: String(editProduct?.salePrice||editProduct?.originalPrice||''),
        description: editProduct?.description||'',
        rating: String(editProduct?.rating||'4.7'),
        emoji: editProduct?.emoji||editProduct?.icon||'✨',
        color: editProduct?.color||'#fcfbfa'
      });
      const [errors, setErrors] = useState({});
      const [saving, setSaving] = useState(false);

      const validate = () => {
        const e = {};
        if (!form.title.trim()) e.title = 'Required';
        if (!form.description.trim()) e.description = 'Required';
        if (!form.price || isNaN(+form.price) || +form.price <= 0) e.price = 'Must be a positive number';
        if (form.salePrice && (isNaN(+form.salePrice) || +form.salePrice <= 0)) e.salePrice = 'Must be positive';
        if (+form.rating < 1 || +form.rating > 5) e.rating = 'Must be 1–5';
        return e;
      };

      const submit = e => {
        e.preventDefault();
        const errs = validate();
        if (Object.keys(errs).length) { setErrors(errs); toast('Fix the highlighted errors.','error'); return; }
        setSaving(true);
        setTimeout(() => {
          onSave({
            id: editProduct?.id,
            title: form.title.trim(),
            name: form.title.trim(),
            category: form.category,
            price: +form.price,
            salePrice: form.salePrice ? +form.salePrice : undefined,
            originalPrice: form.salePrice ? +form.salePrice : undefined,
            description: form.description.trim(),
            rating: +form.rating,
            emoji: form.emoji,
            icon: form.emoji,
            color: form.color,
            colorName: getNearestColorName(form.color)
          });
          setSaving(false);
        }, 600);
      };

      return (
        <div className="space-y-6 fade-in max-w-2xl">
          <div className="flex items-center gap-3">
            {onCancel && (
              <button onClick={onCancel} className="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-gray-100 transition-colors text-gray-500">
                <i className="fas fa-arrow-left"></i>
              </button>
            )}
            <div>
              <h1 className="font-heading text-2xl font-extrabold text-gray-900">{editProduct?'Edit Product':'Add New Product'}</h1>
              <p className="text-gray-400 text-xs mt-0.5">{editProduct?'Update product details below':'Fill in the form to add a new product'}</p>
            </div>
          </div>

          <form onSubmit={submit} className="bg-white rounded-2xl p-6 md:p-8 shadow-sm border border-gray-100 space-y-5">
            <div>
              <label className="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Product Name *</label>
              <input type="text" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="e.g. Premium Silk Tie"
                className={`w-full px-4 py-2.5 border-2 rounded-xl bg-gray-50 text-sm transition-all focus:outline-none focus:bg-white
                  ${errors.title?'border-red-400':'border-gray-100 focus:border-accent'}`}/>
              {errors.title && <p className="text-red-500 text-xs mt-1"><i className="fas fa-exclamation-circle mr-1"></i>{errors.title}</p>}
            </div>

            <div>
              <label className="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Description *</label>
              <textarea rows={4} value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="Describe the product..."
                className={`w-full px-4 py-2.5 border-2 rounded-xl bg-gray-50 text-sm resize-none transition-all focus:outline-none focus:bg-white
                  ${errors.description?'border-red-400':'border-gray-100 focus:border-accent'}`}/>
              {errors.description && <p className="text-red-500 text-xs mt-1"><i className="fas fa-exclamation-circle mr-1"></i>{errors.description}</p>}
            </div>

            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label className="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Category *</label>
                <select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}
                  className="w-full px-4 py-2.5 border-2 border-gray-100 rounded-xl bg-gray-50 text-sm focus:outline-none focus:border-accent focus:bg-white transition-all">
                  {categories.map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
              <div>
                <label className="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Current Price (Br) *</label>
                <input type="number" value={form.price} onChange={e=>setForm(f=>({...f,price:e.target.value}))} placeholder="0.00"
                  className={`w-full px-4 py-2.5 border-2 rounded-xl bg-gray-50 text-sm transition-all focus:outline-none focus:bg-white
                    ${errors.price?'border-red-400':'border-gray-100 focus:border-accent'}`}/>
                {errors.price && <p className="text-red-500 text-xs mt-1"><i className="fas fa-exclamation-circle mr-1"></i>{errors.price}</p>}
              </div>
            </div>

            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label className="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Sale Price (Br)</label>
                <input type="number" value={form.salePrice} onChange={e=>setForm(f=>({...f,salePrice:e.target.value}))} placeholder="Leave blank if no sale"
                  className={`w-full px-4 py-2.5 border-2 rounded-xl bg-gray-50 text-sm transition-all focus:outline-none focus:bg-white
                    ${errors.salePrice?'border-red-400':'border-gray-100 focus:border-accent'}`}/>
              </div>
              <div>
                <label className="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Rating (1-5) *</label>
                <input type="number" step="0.1" value={form.rating} onChange={e=>setForm(f=>({...f,rating:e.target.value}))} placeholder="4.5"
                  className={`w-full px-4 py-2.5 border-2 rounded-xl bg-gray-50 text-sm transition-all focus:outline-none focus:bg-white
                    ${errors.rating?'border-red-400':'border-gray-100 focus:border-accent'}`}/>
              </div>
            </div>

            <div>
              <label className="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Emoji/Icon</label>
              <input type="text" value={form.emoji} onChange={e=>setForm(f=>({...f,emoji:e.target.value}))} placeholder="✨"
                className="w-full px-4 py-2.5 border-2 border-gray-100 rounded-xl bg-gray-50 text-sm focus:outline-none focus:border-accent focus:bg-white transition-all"/>
            </div>

            <div>
              <label className="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Color</label>
              <div className="flex items-center gap-3">
                <input type="color" value={form.color} onChange={e=>setForm(f=>({...f,color:e.target.value}))}
                  className="w-12 h-10 border-2 border-gray-100 rounded-lg cursor-pointer"/>
                <span className="text-sm text-gray-600">{form.color} • {getNearestColorName(form.color)}</span>
              </div>
            </div>

            <div className="flex gap-3 pt-4">
              <button type="button" onClick={onCancel}
                className="flex-1 py-3 border-2 border-gray-200 rounded-xl font-semibold text-sm text-gray-600 hover:bg-gray-50 transition-colors">
                Cancel
              </button>
              <button type="submit" disabled={saving}
                className="flex-1 py-3 bg-accent text-white rounded-xl font-semibold text-sm hover:bg-accent-dark transition-colors disabled:opacity-60">
                {saving ? <><i className="fas fa-spinner fa-spin mr-2"></i>Saving...</> : editProduct ? 'Update Product' : 'Create Product'}
              </button>
            </div>
          </form>
        </div>
      );
    }

    function AnalyticsPage({ products }) {
      return (
        <div className="fade-in">
          <h1 className="font-heading text-2xl font-extrabold text-gray-900 mb-6">Analytics</h1>
          <div className="bg-white rounded-2xl p-8 shadow-sm border border-gray-100 text-center">
            <p className="text-gray-500">Analytics features coming soon...</p>
          </div>
        </div>
      );
    }

    function SettingsPage({ toast }) {
      return (
        <div className="fade-in">
          <h1 className="font-heading text-2xl font-extrabold text-gray-900 mb-6">Settings</h1>
          <div className="bg-white rounded-2xl p-8 shadow-sm border border-gray-100 text-center">
            <p className="text-gray-500">Settings page coming soon...</p>
          </div>
        </div>
      );
    }

    // Render App
    return <App />;
  </script>

  <script>
    const template = document.getElementById('admin-app-template').textContent;
    const code = Babel.transform(template, { presets: ['react'] }).code;
    ReactDOM.createRoot(document.getElementById('root')).render(eval(code));
  </script>
</body>
</html>
